networks:
  secnet:
    external: true

services:
  secnet:
    build: .
    container_name: secnet
    restart: unless-stopped
    networks:
      - secnet
    ports:
      - "${PORT:-8088}:8080"
    env_file:
      - .env
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/health')"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
